<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Challenges Mode</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --terminal-green: #39FF5A;
  --danger-red: #FF3B3B;
  --background: #03080F;
  --panel: #050B12;
  --panel-alt: #08111A;
  --border: #183222;
  --muted: #7FA58A;
  --soft-text: #D7FFE0;
  --boss: #D7B84F;
}

* {
  box-sizing: border-box;
}

body {
  background: var(--background);
  color: var(--terminal-green);
  font-family: 'Press Start 2P', monospace;
  text-align: center;
  padding: 32px 20px;
  margin: 0;
  min-height: 100vh;

  background-image:
    linear-gradient(rgba(57,255,90,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57,255,90,0.03) 1px, transparent 1px);

  background-size: 42px 42px;
}

h1 {
  font-size: 20px;
  letter-spacing: 2px;
  margin-bottom: 14px;
  color: var(--terminal-green);
  text-shadow: none;
}

p {
  font-size: 9px;
  color: var(--muted);
  line-height: 1.7;
}

.challenge-box {
  border: 2px solid var(--border);
  padding: 20px;
  max-width: 650px;
  margin: 22px auto;
  background: var(--panel);
}

.challenge-box p {
  color: var(--soft-text);
}

textarea {
  width: 100%;
  height: 130px;
  background: var(--panel-alt);
  color: var(--terminal-green);
  border: 2px solid var(--border);
  padding: 12px;
  font-family: monospace;
  font-size: 15px;
  box-sizing: border-box;
  outline: none;
  resize: none;
}

textarea:focus {
  border-color: var(--terminal-green);
}

button {
  margin-top: 10px;
  padding: 10px 18px;
  border: 2px solid var(--terminal-green);
  background: transparent;
  color: var(--terminal-green);
  cursor: pointer;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  transition: 0.15s ease;
}

button:hover {
  background: var(--terminal-green);
  color: var(--background);
}

button:active {
  transform: scale(0.96);
}

.timer {
  font-size: 18px;
  margin: 18px 0 10px;
  color: var(--terminal-green);
}

.streak {
  color: var(--boss);
  font-size: 10px;
  margin-bottom: 14px;
}

.meta {
  color: var(--muted);
  font-weight: bold;
  font-size: 9px;
  line-height: 1.9;
  max-width: 780px;
  margin: 22px auto 0;
  border: 2px solid var(--border);
  background: var(--panel);
  padding: 14px;
}

.meta span {
  color: var(--terminal-green);
}

#result {
  font-weight: bold;
  margin-top: 18px;
  font-size: 10px;
  color: var(--terminal-green);
}

.error-shake {
  animation: shake 0.3s ease-in-out;
  border-color: var(--danger-red);
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

.win-glow {
  color: var(--boss);
}

@media (max-width: 700px) {
  body {
    padding: 24px 14px;
  }

  h1 {
    font-size: 16px;
  }

  .meta {
    font-size: 7px;
  }

  .challenge-box {
    padding: 16px;
  }

  textarea {
    font-size: 14px;
  }
}
</style>
</head>

<body class="theme-challenges">

<h1>CHALLENGE MODE</h1>
<p>Random Missions. Adaptive Timer. Big XP.</p>

<div class="meta">
  ROUND: <span id="round">1</span> / 5 |
  XP REWARD: <span id="reward">100</span> |
  DIFFICULTY: <span id="difficulty">Normal</span>
</div>

<div class="timer">⏱ <span id="time">20</span>s</div>
<div class="streak">🔥 Streak: <span id="streak">0</span></div>

<div class="challenge-box" id="challenge-box">
  <p id="instruction"></p>
  <textarea id="code"></textarea><br>
  <button onclick="submitAnswer()">SUBMIT</button>
  <button onclick="window.location.href='dashboard.html'">EXIT</button>
</div>

<p id="result"></p>

<script>
const allChallenges = [
  { q: 'Type: h1 { color: blue; }', a: 'h1{color:blue;}', difficulty: "easy" },
  { q: 'Type: p { color: red; }', a: 'p{color:red;}', difficulty: "easy" },
  { q: 'Type: body { background-color: black; }', a: 'body{background-color:black;}', difficulty: "easy" },
  { q: 'Type: h1 { font-size: 40px; }', a: 'h1{font-size:40px;}', difficulty: "medium" },
  { q: 'Type: .card { padding: 20px; }', a: '.card{padding:20px;}', difficulty: "medium" },
  { q: 'Type: .card { text-align: center; }', a: '.card{text-align:center;}', difficulty: "medium" },
  { q: 'Type: .card { border: 2px solid blue; }', a: '.card{border:2pxsolidblue;}', difficulty: "hard" },
  { q: 'Type: button { background-color: yellow; }', a: 'button{background-color:yellow;}', difficulty: "hard" },
  { q: 'Type: h2 { margin: 10px; }', a: 'h2{margin:10px;}', difficulty: "hard" }
];

let challengeSet = [];
let current = 0;
let time = 20;
let timer;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let reward = 100;

let challengeWins = parseInt(localStorage.getItem("challenge-wins")) || 0;
let challengeLosses = parseInt(localStorage.getItem("challenge-losses")) || 0;

function normalize(text) {
  return text.replace(/\s+/g, "").toLowerCase();
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function getDifficultyMode() {
  if (challengeWins >= challengeLosses + 3) return "Hard";
  if (challengeLosses >= challengeWins + 2) return "Easy";
  return "Normal";
}

function buildChallengeSet() {
  const mode = getDifficultyMode();
  let pool = [];

  if (mode === "Easy") {
    pool = allChallenges.filter(c => c.difficulty === "easy" || c.difficulty === "medium");
  } else if (mode === "Hard") {
    pool = allChallenges.filter(c => c.difficulty === "medium" || c.difficulty === "hard");
  } else {
    pool = allChallenges;
  }

  challengeSet = shuffle([...pool]).slice(0, 5);
  document.getElementById("difficulty").innerText = mode;
}

function getTimeForRound() {
  const mode = getDifficultyMode();

  let baseTime = 20;

  if (mode === "Easy") baseTime = 25;
  if (mode === "Normal") baseTime = 20;
  if (mode === "Hard") baseTime = 17;

  if (current < 2) return baseTime;
  if (current < 4) return Math.max(baseTime - 2, 15);
  return Math.max(baseTime - 5, 15);
}

function loadChallenge() {
  if (current >= challengeSet.length) {
    winGame();
    return;
  }

  time = getTimeForRound();

  document.getElementById("round").innerText = current + 1;
  document.getElementById("time").innerText = time;
  document.getElementById("streak").innerText = streak;
  document.getElementById("reward").innerText = reward;
  document.getElementById("instruction").innerText = challengeSet[current].q;
  document.getElementById("code").value = "";
  document.getElementById("result").innerText = "";
  document.getElementById("difficulty").innerText = getDifficultyMode();

  clearInterval(timer);

  timer = setInterval(function () {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
      failGame("⏱ Time ran out!");
    }
  }, 1000);
}

function submitAnswer() {
  const user = normalize(document.getElementById("code").value);
  const correct = challengeSet[current].a;

  if (user === correct) {
    clearInterval(timer);

    streak++;
    localStorage.setItem("streak", streak);

    reward += 10;

    current++;
    loadChallenge();
  } else {
    failGame("❌ Wrong answer!");
  }
}

function failGame(message) {
  clearInterval(timer);

  challengeLosses++;
  localStorage.setItem("challenge-losses", challengeLosses);

  streak = 0;
  localStorage.setItem("streak", streak);

  document.getElementById("streak").innerText = 0;
  document.getElementById("result").style.color = "#FF3B3B";
  document.getElementById("result").innerText = message + " Restarting run with adjusted difficulty...";

  const box = document.getElementById("challenge-box");
  box.classList.add("error-shake");

  setTimeout(function () {
    box.classList.remove("error-shake");
  }, 300);

  setTimeout(function () {
    current = 0;
    reward = 100;
    document.getElementById("result").style.color = "#39FF5A";
    buildChallengeSet();
    loadChallenge();
  }, 1500);
}

function winGame() {
  clearInterval(timer);

  challengeWins++;
  localStorage.setItem("challenge-wins", challengeWins);

  let xp = parseInt(localStorage.getItem("xp")) || 0;
  xp += reward;
  localStorage.setItem("xp", xp);

  document.querySelector("h1").classList.add("win-glow");
  document.getElementById("result").style.color = "#39FF5A";
  document.getElementById("result").innerText = "🏆 CHALLENGE CLEARED! +" + reward + " XP";

  setTimeout(function () {
    window.location.href = "dashboard.html";
  }, 3000);
}

buildChallengeSet();
loadChallenge();
</script>

</body>
</html>
