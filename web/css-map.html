<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Circuit Map</title>
<link rel="stylesheet" href="arcade-theme.css">

<style>
body {
  background: #020617;
  color: #38bdf8;
  font-family: monospace;
  text-align: center;
  padding: 40px;
  margin: 0;
}

h1 {
  text-shadow: 0 0 10px #38bdf8;
}

p {
  color: #7dd3fc;
}

.stats-panel {
  margin: 20px auto;
  border: 2px solid #38bdf8;
  background: #020617;
  padding: 15px;
  width: 320px;
  box-shadow: 0 0 15px rgba(56,189,248,0.3);
}

.unlock-message {
  display: none;
  margin: 25px auto;
  padding: 18px;
  width: 340px;
  border: 2px solid #38bdf8;
  background: #38bdf8;
  color: black;
  box-shadow: 0 0 25px #38bdf8;
}

.reset-area {
  margin-top: 15px;
}

.reset-btn {
  background: transparent;
  color: #f87171;
  border: 2px solid #f87171;
  padding: 8px 16px;
  cursor: pointer;
}

.reset-btn:hover {
  background: #f87171;
  color: black;
  box-shadow: 0 0 10px #f87171;
}

.reset-warning {
  font-size: 10px;
  opacity: 0.4;
}

.map {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  margin-top: 40px;
}

.node {
  border: 2px solid #38bdf8;
  padding: 15px 25px;
  width: 300px;
  background: #020617;
  transition: 0.2s;
}

.node.completed {
  color: #38bdf8;
  box-shadow: 0 0 15px rgba(56,189,248,0.6);
}

.node.active {
  background: #38bdf8;
  color: black;
  cursor: pointer;
  box-shadow: 0 0 25px #38bdf8;
}

.node.active:hover {
  transform: scale(1.05);
}

.node.locked {
  opacity: 0.3;
}

.node.boss {
  border-color: #60a5fa;
}

.node.boss.active {
  background: #60a5fa;
  color: black;
  box-shadow: 0 0 25px #60a5fa;
}

.line {
  width: 2px;
  height: 20px;
  background: rgba(56,189,248,0.5);
}

.back-btn {
  margin-top: 40px;
  background: transparent;
  color: #38bdf8;
  border: 2px solid #38bdf8;
  padding: 10px 20px;
  cursor: pointer;
}

.back-btn:hover {
  background: #38bdf8;
  color: black;
}
</style>
</head>

<body class="theme-css">

<h1>CSS CIRCUIT</h1>
<p>STYLE THE INTERFACE</p>

<div class="stats-panel">
  <p>XP: <span id="xp">0</span></p>
  <p>MISSIONS COMPLETED: <span id="completed">0</span> / 7</p>
  <p>CURRENT MISSION: <span id="current">1</span></p>
</div>

<div id="unlock-message" class="unlock-message">
  🔓 JS CORE UNLOCKED
</div>

<div class="reset-area">
  <button onclick="resetProgress()" class="reset-btn">RESET CSS PROGRESS</button>
  <p class="reset-warning">this erases css progress only</p>
</div>

<div class="map" id="map"></div>

<button class="back-btn" onclick="goBack()">← BACK</button>

<script>
const htmlLevel = parseInt(localStorage.getItem("html-level")) || 1;

if (htmlLevel < 8) {
  alert("CSS Circuit is locked. Finish HTML first!");
  window.location.href = "index.html";
}

const missions = [
  "Mission 1: Colors",
  "Mission 2: Backgrounds",
  "Mission 3: Font Size",
  "Mission 4: Borders",
  "Mission 5: Alignment",
  "Mission 6: Spacing",
  "BOSS MODE"
];

let level = parseInt(localStorage.getItem("css-level")) || 1;
let xp = parseInt(localStorage.getItem("xp")) || 0;

const map = document.getElementById("map");

function loadStats() {
  const completed = Math.min(level - 1, missions.length);
  const current = level > missions.length ? "COMPLETE" : level;

  document.getElementById("xp").innerText = xp;
  document.getElementById("completed").innerText = completed;
  document.getElementById("current").innerText = current;

  if (level > missions.length) {
    document.getElementById("unlock-message").style.display = "block";
  }
}

function buildMap() {
  map.innerHTML = "";

  missions.forEach((name, index) => {
    const node = document.createElement("div");
    node.classList.add("node");

    const num = index + 1;
    const isBoss = num === missions.length;

    if (isBoss) node.classList.add("boss");

    if (num < level) {
      node.classList.add("completed");
      node.innerText = "✅ " + name;
    } else if (num === level) {
      node.classList.add("active");
      node.innerText = isBoss ? "⚔️ " + name : "⚡ " + name;

      node.onclick = () => {
        window.location.href = "css-arena.html";
      };
    } else {
      node.classList.add("locked");
      node.innerText = "🔒 " + name;
    }

    map.appendChild(node);

    if (index < missions.length - 1) {
      const line = document.createElement("div");
      line.classList.add("line");
      map.appendChild(line);
    }
  });
}

function resetProgress() {
  if (confirm("Reset CSS progress?")) {
    localStorage.removeItem("css-level");
    level = 1;
    loadStats();
    buildMap();
  }
}

function goBack() {
  window.location.href = "dashboard.html";
}

loadStats();
buildMap();
</script>

</body>
</html>
