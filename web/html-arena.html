<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML Arena Mission</title>

  <style>
    body {
      background: #03080f;
      color: #39ff5a;
      font-family: monospace;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    h1, h2, h3 {
      color: #39ff5a;
    }

    .highlight {
      color: #39ff5a;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(57, 255, 90, 0.7);
    }

    .bytebot {
      max-width: 900px;
      margin: 20px auto;
      border: 2px solid #39ff5a;
      background: #050b12;
      padding: 18px;
      text-align: left;
      box-shadow: 0 0 15px rgba(57, 255, 90, 0.25);
    }

    .bytebot strong {
      color: #9affaa;
    }

    .arena-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
    }

    textarea,
    iframe {
      width: 100%;
      height: 260px;
      border: 2px solid #39ff5a;
      box-sizing: border-box;
    }

    textarea {
      background: #050b12;
      color: #39ff5a;
      padding: 15px;
      font-family: monospace;
      font-size: 16px;
      resize: none;
      outline: none;
    }

    iframe {
      background: white;
    }

    button {
      background: transparent;
      color: #39ff5a;
      border: 2px solid #39ff5a;
      padding: 10px 18px;
      margin: 10px 5px;
      cursor: pointer;
      font-family: monospace;
    }

    button:hover {
      background: #39ff5a;
      color: black;
    }

    #result,
    #hint,
    #warning {
      font-weight: bold;
      margin-top: 15px;
    }

    #hint {
      color: #9affaa;
    }

    #warning {
      color: #ff4d4d;
      font-size: 13px;
    }

    @media (max-width: 800px) {
      .arena-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <h1>HTML ARENA</h1>
  <h2 id="mission-title"></h2>
  <p id="mission-task"></p>

  <div class="bytebot">
    <strong>🤖 ByteBot:</strong>
    <span id="bytebot-message"></span>
  </div>

  <div class="arena-layout">

    <div>
      <h3>Code Editor</h3>
      <textarea id="code"></textarea>

      <button onclick="checkCode()">Run</button>
      <button onclick="window.location.href='html-map.html'">← BACK TO MAP</button>
    </div>

    <div>
      <h3>Live Preview</h3>
      <iframe id="preview"></iframe>
    </div>

  </div>

  <p id="result"></p>
  <p id="hint"></p>
  <p id="warning"></p>

  <script>
    let level = parseInt(localStorage.getItem("html-level")) || 1;
    let attempts = 0;

    const missions = {
      1: {
        title: "Mission 1: Headings",
        task: 'Type the full h1 code to show <span class="highlight">"Hello World"</span>.',
        starter: "<h1></h1>",
        tag: "h1",
        success: "SYSTEM RESTORED: Main title activated.",
        bytebot: 'Use h1 tags and place <span class="highlight">"Hello World"</span> inside.',
        hint1: "You need an opening h1 tag and a closing h1 tag.",
        hint2: "Pattern: <h1>Hello World</h1>",
        check: function (code) {
          return code === "<h1>helloworld</h1>";
        }
      },

      2: {
        title: "Mission 2: Paragraphs",
        task: 'Type the full p code to show <span class="highlight">"I love coding"</span>.',
        starter: "<p></p>",
        tag: "p",
        success: "MESSAGE SIGNAL RESTORED.",
        bytebot: 'Use paragraph tags and place <span class="highlight">"I love coding"</span> inside.',
        hint1: "You need <p> at the beginning and </p> at the end.",
        hint2: "Pattern: <p>I love coding</p>",
        check: function (code) {
          return code === "<p>ilovecoding</p>";
        }
      },

      3: {
        title: "Mission 3: Buttons",
        task: 'Type the full button code to show <span class="highlight">"Click Me"</span>.',
        starter: "<button></button>",
        tag: "button",
        success: "CONTROL BUTTON ONLINE.",
        bytebot: 'Create a button element. The text should be <span class="highlight">"Click Me"</span>.',
        hint1: "Button text goes between <button> and </button>.",
        hint2: "Pattern: <button>Click Me</button>",
        check: function (code) {
          return code === "<button>clickme</button>";
        }
      },

      4: {
        title: "Mission 4: Links",
        task: 'Type the full link code to show <span class="highlight">"Visit Site"</span>.',
        starter: '<a href="#"></a>',
        tag: "a",
        success: "PORTAL LINK ACTIVATED.",
        bytebot: 'Create an anchor tag. Use href="#" and make the visible text <span class="highlight">"Visit Site"</span>.',
        hint1: "The href attribute goes inside the opening <a> tag.",
        hint2: 'Pattern: <a href="#">Visit Site</a>',
        check: function (code) {
          return code === '<ahref="#">visitsite</a>';
        }
      },

      5: {
        title: "Mission 5: Images",
        task: 'Type the full image code using <span class="highlight">"image.png"</span>.',
        starter: '<img src="">',
        tag: "img",
        selfClosing: true,
        success: "IMAGE MODULE LOADED.",
        bytebot: 'Create an image tag and set the src value to <span class="highlight">"image.png"</span>.',
        hint1: "The image tag uses src to point to the file.",
        hint2: 'Pattern: <img src="image.png">',
        check: function (code) {
          return code === '<imgsrc="image.png">';
        }
      },

      6: {
        title: "Mission 6: Lists",
        task: 'Type the full list code with one item: <span class="highlight">"Code"</span>.',
        starter: "<ul>\n  <li></li>\n</ul>",
        tag: "ul",
        extraTags: ["li"],
        success: "INVENTORY SYSTEM RESTORED.",
        bytebot: 'Create a ul list. Inside it, add one li item that says <span class="highlight">"Code"</span>.',
        hint1: "A list item must be inside the ul tag.",
        hint2: "Pattern: <ul><li>Code</li></ul>",
        check: function (code) {
          return code === "<ul><li>code</li></ul>";
        }
      },

      7: {
        title: "BOSS MODE: Profile Card",
        task: 'Build a profile card using <span class="highlight">"h1, p, img, and button"</span>.',
        starter: "<h1>Your Name</h1>\n<p>Your bio here</p>\n<img src=\"profile.png\">\n<button>Follow Me</button>",
        boss: true,
        success: "BOSS CLEARED: CSS CIRCUIT UNLOCKED.",
        bytebot: 'Final HTML test. Your card must include <span class="highlight">"h1, p, img, and button"</span>.',
        hint1: "You need h1, p, img src=\"profile.png\", and button.",
        hint2: "Make sure all required tags are present.",
        check: function (code) {
          const hasH1 = code.includes("<h1>") && code.includes("</h1>");
          const hasP = code.includes("<p>") && code.includes("</p>");
          const hasImg = code.includes('<imgsrc="profile.png">');
          const hasButton = code.includes("<button>") && code.includes("</button>");

          return hasH1 && hasP && hasImg && hasButton;
        }
      }
    };

    function loadMission() {
      const mission = missions[level];
      const title = document.getElementById("mission-title");
      const task = document.getElementById("mission-task");
      const result = document.getElementById("result");
      const hint = document.getElementById("hint");
      const warning = document.getElementById("warning");
      const bytebot = document.getElementById("bytebot-message");
      const codeBox = document.getElementById("code");

      attempts = 0;
      result.innerText = "";
      hint.innerText = "";
      warning.innerText = "";

      if (!mission) {
        title.innerText = "HTML ARENA COMPLETE!";
        task.innerText = "You completed all HTML missions.";
        bytebot.innerText = "CSS Circuit is ready. Head back to Mission Control.";
        codeBox.value = "";
        updatePreview();
        return;
      }

      title.innerText = mission.title;
      task.innerHTML = mission.task;
      bytebot.innerHTML = mission.bytebot;
      codeBox.value = mission.starter;

      updatePreview();
    }

    function normalize(input) {
      return input.replace(/\s+/g, "").toLowerCase();
    }

    function countMatches(text, pattern) {
      const matches = text.match(pattern);
      return matches ? matches.length : 0;
    }

    function checkSyntaxWarnings(rawCode) {
      const warning = document.getElementById("warning");
      const mission = missions[level];

      warning.innerText = "";

      if (!mission || rawCode.trim().length === 0) {
        return;
      }

      const code = rawCode.trim();
      const normalized = normalize(code);

      const openBracketCount = countMatches(code, /</g);
      const closeBracketCount = countMatches(code, />/g);

      if (openBracketCount === 0 || closeBracketCount === 0) {
        warning.innerText = "⚠️ Uh-oh, you removed a tag bracket < or > — add it back!";
        return;
      }

      if (openBracketCount !== closeBracketCount) {
        warning.innerText = "⚠️ Your < and > brackets are not balanced. Every tag needs both sides.";
        return;
      }

      if (code.includes("< ") || code.includes("</ ")) {
        warning.innerText = "⚠️ There should be no space right after < or </ inside a tag.";
        return;
      }

      if (mission.boss) {
        const requiredTags = ["h1", "p", "img", "button"];

        for (let i = 0; i < requiredTags.length; i++) {
          const tag = requiredTags[i];

          if (tag === "img") {
            if (!normalized.includes("<img")) {
              warning.innerText = "⚠️ Boss Mode needs an image tag. Add <img src=\"profile.png\">.";
              return;
            }
          } else {
            if (!normalized.includes("<" + tag + ">")) {
              warning.innerText = "⚠️ Missing opening tag: <" + tag + ">";
              return;
            }

            if (!normalized.includes("</" + tag + ">")) {
              warning.innerText = "⚠️ Missing closing tag: </" + tag + ">";
              return;
            }
          }
        }

        return;
      }

      if (mission.selfClosing) {
        if (!normalized.includes("<img")) {
          warning.innerText = "⚠️ Missing image tag. Start with <img.";
          return;
        }

        if (!normalized.includes("src=")) {
          warning.innerText = "⚠️ Missing src attribute. The image needs src=\"image.png\".";
          return;
        }

        if (!normalized.includes("image.png")) {
          warning.innerText = "⚠️ Missing image file name: \"image.png\".";
          return;
        }

        return;
      }

      if (mission.tag) {
        const tag = mission.tag;

        if (!normalized.includes("<" + tag + ">") && tag !== "a") {
          warning.innerText = "⚠️ Missing opening tag: <" + tag + ">";
          return;
        }

        if (tag === "a" && !normalized.includes("<ahref=")) {
          warning.innerText = "⚠️ Missing link opening tag. Use something like <a href=\"#\">.";
          return;
        }

        if (!normalized.includes("</" + tag + ">")) {
          warning.innerText = "⚠️ Missing closing tag: </" + tag + ">";
          return;
        }
      }

      if (mission.extraTags) {
        for (let i = 0; i < mission.extraTags.length; i++) {
          const tag = mission.extraTags[i];

          if (!normalized.includes("<" + tag + ">")) {
            warning.innerText = "⚠️ Missing opening tag: <" + tag + ">";
            return;
          }

          if (!normalized.includes("</" + tag + ">")) {
            warning.innerText = "⚠️ Missing closing tag: </" + tag + ">";
            return;
          }
        }
      }
    }

    function checkCode() {
      const rawCode = document.getElementById("code").value;
      const code = normalize(rawCode);
      const result = document.getElementById("result");
      const mission = missions[level];

      updatePreview();

      if (!mission) {
        result.innerText = "🏆 HTML Arena already complete.";
        return;
      }

      if (mission.check(code)) {
        const reward = mission.boss ? 50 : 10;
        success(reward, level + 1, mission.success);
      } else {
        attempts++;
        showHint(mission);
        result.innerText = "❌ System not restored yet.";
      }
    }

    function showHint(mission) {
      const hint = document.getElementById("hint");

      if (attempts === 1) {
        hint.innerText = "Hint 1: " + mission.hint1;
      } else if (attempts >= 2) {
        hint.innerText = "Hint 2: " + mission.hint2;
      }
    }

    function success(xpGain, nextLevel, message) {
      const result = document.getElementById("result");
      const hint = document.getElementById("hint");
      const warning = document.getElementById("warning");

      result.innerText = "✅ " + message + " +" + xpGain + " XP";
      hint.innerText = "";
      warning.innerText = "";

      addXP(xpGain);
      level = nextLevel;
      localStorage.setItem("html-level", level);

      setTimeout(function () {
        window.location.href = "html-map.html";
      }, 1400);
    }

    function addXP(points) {
      let xp = parseInt(localStorage.getItem("xp")) || 0;
      xp += points;
      localStorage.setItem("xp", xp);
    }

    function updatePreview() {
      const code = document.getElementById("code").value;

      document.getElementById("preview").srcdoc = code;
      checkSyntaxWarnings(code);
    }

    document.getElementById("code").addEventListener("input", updatePreview);

    loadMission();
  </script>

</body>
</html>
