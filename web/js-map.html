<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JavaScript Core</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --terminal-green: #39FF5A;
  --danger-red: #FF3B3B;
  --background: #03080F;
  --panel: #050B12;
  --panel-alt: #08111A;
  --border: #183222;
  --muted: #7FA58A;
  --boss: #D7B84F;
}

* {
  box-sizing: border-box;
}

body {
  background: var(--background);
  color: var(--terminal-green);
  font-family: 'Press Start 2P', monospace;
  text-align: center;
  padding: 32px 20px;
  margin: 0;
  min-height: 100vh;

  background-image:
    linear-gradient(rgba(57,255,90,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57,255,90,0.03) 1px, transparent 1px);

  background-size: 42px 42px;
}

h1 {
  font-size: 20px;
  letter-spacing: 2px;
  margin-bottom: 14px;
  color: var(--terminal-green);
}

p {
  font-size: 9px;
  color: var(--muted);
  line-height: 1.7;
}

.stats-panel {
  margin: 22px auto;
  border: 2px solid var(--border);
  background: var(--panel);
  padding: 16px;
  width: 320px;
}

.stats-panel p {
  margin: 10px 0;
}

.unlock-message {
  display: none;
  margin: 22px auto;
  padding: 16px;
  width: 340px;
  border: 2px solid var(--terminal-green);
  background: var(--panel);
  color: var(--terminal-green);
  font-size: 10px;
}

.reset-area {
  margin-top: 12px;
}

.reset-btn {
  background: transparent;
  color: var(--danger-red);
  border: 2px solid var(--danger-red);
  padding: 10px 14px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  cursor: pointer;
  transition: 0.15s ease;
}

.reset-btn:hover {
  background: var(--danger-red);
  color: var(--background);
}

.reset-warning {
  font-size: 7px;
  color: var(--danger-red);
  opacity: 0.6;
  margin-top: 8px;
}

.map {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  margin-top: 36px;
}

.node {
  border: 2px solid var(--border);
  padding: 14px 18px;
  width: 320px;
  background: var(--panel);
  color: var(--muted);
  font-size: 9px;
  transition: 0.18s ease;
}

.node.completed {
  color: var(--terminal-green);
  border-color: #245A38;
  background: var(--panel-alt);
}

.node.active {
  background: #112417;
  color: var(--terminal-green);
  border-color: var(--terminal-green);
  cursor: pointer;
}

.node.active:hover {
  transform: translateY(-2px);
}

.node.locked {
  opacity: 0.28;
  cursor: not-allowed;
}

.node.boss {
  border-color: #66562B;
}

.node.boss.active {
  background: #2B2411;
  border-color: var(--boss);
  color: var(--boss);
}

.line {
  width: 2px;
  height: 16px;
  background: var(--border);
}

.back-btn {
  margin-top: 36px;
  background: transparent;
  color: var(--terminal-green);
  border: 2px solid var(--terminal-green);
  padding: 12px 18px;
  cursor: pointer;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  transition: 0.15s ease;
}

.back-btn:hover {
  background: var(--terminal-green);
  color: var(--background);
}

@media (max-width: 600px) {
  body {
    padding: 24px 14px;
  }

  h1 {
    font-size: 16px;
  }

  .stats-panel,
  .unlock-message,
  .node {
    width: 100%;
    max-width: 340px;
  }

  .node {
    font-size: 8px;
    padding: 13px 14px;
  }
}
</style>
</head>

<body class="theme-js">

<h1>JAVASCRIPT ARENA</h1>
<p>POWER THE INTERACTION</p>

<div class="stats-panel">
  <p>XP: <span id="xp">0</span></p>
  <p>MISSIONS COMPLETED: <span id="completed">0</span> / 7</p>
  <p>CURRENT MISSION: <span id="current">1</span></p>
</div>

<div id="unlock-message" class="unlock-message">
  🔓 NEXT WORLD UNLOCKED
</div>

<div class="reset-area">
  <button onclick="resetProgress()" class="reset-btn">RESET JS PROGRESS</button>
  <p class="reset-warning">this erases javascript progress only</p>
</div>

<div class="map" id="map"></div>

<button class="back-btn" onclick="goBack()">← BACK</button>

<script>
const cssLevel = parseInt(localStorage.getItem("css-level")) || 1;

if (cssLevel < 8) {
  alert("JavaScript Arena is locked. Finish CSS Circuit first!");
  window.location.href = "dashboard.html";
}

const missions = [
  "Mission 1: Variables",
  "Mission 2: Functions",
  "Mission 3: Buttons & Click Events",
  "Mission 4: Conditions",
  "Mission 5: Loops",
  "Mission 6: DOM Manipulation",
  "BOSS MODE: Counter App"
];

let level = parseInt(localStorage.getItem("js-level")) || 1;
let xp = parseInt(localStorage.getItem("xp")) || 0;

const map = document.getElementById("map");

function loadStats() {
  const completed = Math.min(level - 1, missions.length);
  const currentMission = level > missions.length ? "COMPLETE" : level;

  document.getElementById("xp").innerText = xp;
  document.getElementById("completed").innerText = completed;
  document.getElementById("current").innerText = currentMission;

  if (level > missions.length) {
    document.getElementById("unlock-message").style.display = "block";
  } else {
    document.getElementById("unlock-message").style.display = "none";
  }
}

function buildMap() {
  map.innerHTML = "";

  missions.forEach(function (name, index) {
    const node = document.createElement("div");
    node.classList.add("node");

    const missionNumber = index + 1;
    const isBoss = missionNumber === missions.length;

    if (isBoss) {
      node.classList.add("boss");
    }

    if (missionNumber < level) {
      node.classList.add("completed");
      node.innerText = "✅ " + name;
    } else if (missionNumber === level) {
      node.classList.add("active");
      node.innerText = isBoss ? "⚔️ " + name : "⚡ " + name;

      node.onclick = function () {
        window.location.href = "js-arena.html";
      };
    } else {
      node.classList.add("locked");
      node.innerText = "🔒 " + name;
    }

    map.appendChild(node);

    if (index < missions.length - 1) {
      const line = document.createElement("div");
      line.classList.add("line");
      map.appendChild(line);
    }
  });
}

function resetProgress() {
  const confirmReset = confirm("Reset JavaScript progress?");

  if (confirmReset) {
    localStorage.removeItem("js-level");

    level = 1;

    loadStats();
    buildMap();
  }
}

function goBack() {
  window.location.href = "dashboard.html";
}

loadStats();
buildMap();
</script>

</body>
</html>
