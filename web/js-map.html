<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Core Map</title>
  <link rel="stylesheet" href="arcade-theme.css">

  <style>
    body {
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    body.theme-js {
      --accent: #FF0000;
    }

    .map-header {
      max-width: 900px;
      margin: 0 auto 25px;
    }

    .map-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      max-width: 950px;
      margin: 30px auto;
    }

    .node {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
      cursor: pointer;
      transition: 0.2s;
    }

    .node:hover {
      border-color: #FF0000;
      transform: translateY(-3px);
    }

    .node.locked {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .node.completed {
      border-color: #FF0000;
    }

    .status {
      font-size: 13px;
      margin-top: 8px;
    }

    @media (max-width: 800px) {
      .map-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="theme-js">

  <div class="map-header">
    <h1>JS CORE</h1>
    <p>Complete JavaScript missions and unlock interaction skills.</p>
  </div>

  <div class="map-grid">

    <div class="node" id="node-1" onclick="openMission(1)">
      <h3>Mission 1</h3>
      <p>Variables</p>
      <div class="status" id="status-1">▶ Ready</div>
    </div>

    <div class="node locked" id="node-2" onclick="openMission(2)">
      <h3>Mission 2</h3>
      <p>Functions</p>
      <div class="status" id="status-2">🔒 Locked</div>
    </div>

    <div class="node locked" id="node-3" onclick="openMission(3)">
      <h3>Mission 3</h3>
      <p>Click Events</p>
      <div class="status" id="status-3">🔒 Locked</div>
    </div>

    <div class="node locked" id="node-4" onclick="openMission(4)">
      <h3>Mission 4</h3>
      <p>Conditions</p>
      <div class="status" id="status-4">🔒 Locked</div>
    </div>

    <div class="node locked" id="node-5" onclick="openMission(5)">
      <h3>Mission 5</h3>
      <p>Loops</p>
      <div class="status" id="status-5">🔒 Locked</div>
    </div>

    <div class="node locked" id="node-6" onclick="openMission(6)">
      <h3>Mission 6</h3>
      <p>DOM Text</p>
      <div class="status" id="status-6">🔒 Locked</div>
    </div>

    <div class="node locked" id="node-7" onclick="openMission(7)">
      <h3>Boss Mode</h3>
      <p>Click Counter App</p>
      <div class="status" id="status-7">🔒 Locked</div>
    </div>

  </div>

  <button onclick="window.location.href='index.html'">← Back to Home</button>

  <script>
    let jsLevel = parseInt(localStorage.getItem("js-level")) || 1;

    function updateMap() {
      for (let i = 1; i <= 7; i++) {
        const node = document.getElementById("node-" + i);
        const status = document.getElementById("status-" + i);

        if (i < jsLevel) {
          node.classList.remove("locked");
          node.classList.add("completed");
          status.innerText = "✅ Completed";
        } else if (i === jsLevel) {
          node.classList.remove("locked");
          status.innerText = "▶ Ready";
        } else {
          node.classList.add("locked");
          status.innerText = "🔒 Locked";
        }
      }
    }

    function openMission(missionNumber) {
      if (missionNumber > jsLevel) {
        alert("Complete the previous JS mission first.");
        return;
      }

      localStorage.setItem("current-js-mission", missionNumber);
      window.location.href = "js-arena.html";
    }

    updateMap();
  </script>

</body>
</html>
