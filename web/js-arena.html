<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JavaScript Arena Mission</title>

  <style>
    body {
      background: #03080F;
      color: #39FF5A;
      font-family: monospace;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    h1, h2, h3 {
      color: #39FF5A;
      letter-spacing: 1px;
    }

    .highlight {
      color: #FF3B3B;
      font-weight: bold;
    }

    .bytebot {
      max-width: 850px;
      margin: 20px auto;
      border: 2px solid #39FF5A;
      background: #050B12;
      padding: 18px;
      text-align: left;
    }

    .arena-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
      width: 84%;
      max-width: 1000px;
      margin: 30px auto;
    }

    textarea,
    iframe,
    .console-panel {
      width: 100%;
      border: 2px solid #39FF5A;
      box-sizing: border-box;
      background: #050B12;
    }

    textarea {
      height: 300px;
      color: #39FF5A;
      padding: 15px;
      font-family: monospace;
      font-size: 15px;
      resize: none;
      outline: none;
    }

    iframe {
      height: 190px;
    }

    .console-panel {
      height: 90px;
      margin-top: 16px;
      color: #39FF5A;
      padding: 12px;
      text-align: left;
      overflow-y: auto;
      font-size: 13px;
      white-space: pre-wrap;
    }

    button {
      background: transparent;
      color: #39FF5A;
      border: 2px solid #39FF5A;
      padding: 10px 18px;
      margin: 10px 5px;
      cursor: pointer;
      font-family: monospace;
    }

    button:hover {
      background: #39FF5A;
      color: #03080F;
    }

    button:active {
      transform: scale(0.95);
    }

    #result,
    #hint,
    #warning {
      font-weight: bold;
      margin-top: 15px;
    }

    #hint {
      color: #39FF5A;
      opacity: 0.75;
    }

    #warning {
      color: #FF3B3B;
      font-size: 13px;
    }

    .success-flash {
      animation: flash 0.4s ease-in-out;
    }

    @keyframes flash {
      0% { background-color: #03080F; }
      50% { background-color: #082015; }
      100% { background-color: #03080F; }
    }

    .xp-pop {
      position: fixed;
      left: 50%;
      top: 60%;
      color: #39FF5A;
      font-size: 20px;
      font-weight: bold;
      pointer-events: none;
      animation: xpFloat 1s ease-out forwards;
      z-index: 9999;
    }

    @keyframes xpFloat {
      0% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-40px) scale(1.2);
      }
    }

    @media (max-width: 800px) {
      .arena-layout {
        grid-template-columns: 1fr;
        width: 92%;
      }
    }
  </style>
</head>

<body>

  <h1>JAVASCRIPT ARENA</h1>
  <h2 id="mission-title"></h2>

  <div class="bytebot">
    <strong>🤖 ByteBot:</strong>
    <span id="bytebot-message"></span>
  </div>

  <div class="arena-layout">
    <div>
      <h3>Code Editor</h3>
      <textarea id="code"></textarea>

      <button onclick="checkCode()">Run</button>
      <button onclick="window.location.href='js-map.html'">← BACK TO MAP</button>
    </div>

    <div>
      <h3>Live Preview</h3>
      <iframe id="preview"></iframe>

      <h3>Console Output</h3>
      <div id="console-output" class="console-panel">Console ready...</div>
    </div>
  </div>

  <p id="result"></p>
  <p id="hint"></p>
  <p id="warning"></p>

  <audio id="success-sound" src="./sounds/success.mp3" preload="auto"></audio>
  <audio id="error-sound" src="./sounds/error.mp3" preload="auto"></audio>
  <audio id="unlock-sound" src="./sounds/unlock.mp3" preload="auto"></audio>
  <audio id="mistake-sound" src="./sounds/mistake.mp3" preload="auto"></audio>

  <script>
    let level = parseInt(localStorage.getItem("js-level")) || 1;
    let attempts = 0;
    let lastWarningMessage = "";

    const missions = {
      1: {
        title: "Mission 1: Variables",
        starter: 'var playerName = "";',
        success: "VARIABLE CORE RESTORED.",
        bytebot: 'Create a variable named <span class="highlight">playerName</span> and set it to <span class="highlight">"Byte"</span>.',
        hint1: 'Use: var playerName = "Byte";',
        hint2: 'Final answer should be: var playerName = "Byte";',
        previewHTML: '<h2>Variable Terminal</h2><p id="output">Waiting for player name...</p>',
        check: function (win) {
          return win.playerName === "Byte";
        }
      },

      2: {
        title: "Mission 2: Functions",
        starter: 'function powerUp() {\n  return "";\n}',
        success: "POWER FUNCTION ONLINE.",
        bytebot: 'Create a function named <span class="highlight">powerUp()</span> that returns <span class="highlight">"Boost activated"</span>.',
        hint1: 'Inside the function, return "Boost activated".',
        hint2: 'Final answer should return this exact text: "Boost activated"',
        previewHTML: '<h2>Function Terminal</h2><p id="output">Waiting for power function...</p>',
        check: function (win) {
          return typeof win.powerUp === "function" && win.powerUp() === "Boost activated";
        }
      },

      3: {
        title: "Mission 3: Buttons & Click Events",
        starter: 'document.getElementById("power-btn").addEventListener("click", function () {\n  document.getElementById("output").innerText = "";\n});',
        success: "CLICK EVENT CONNECTED.",
        bytebot: 'Make the button change the output text to <span class="highlight">"Power Online"</span> when clicked.',
        hint1: 'Use innerText inside the click event.',
        hint2: 'Set output.innerText to "Power Online".',
        previewHTML: '<h2>Event Terminal</h2><button id="power-btn">Power Button</button><p id="output">Offline</p>',
        check: function (win) {
          const button = win.document.getElementById("power-btn");
          const output = win.document.getElementById("output");

          if (!button || !output) return false;

          button.click();

          return output.innerText === "Power Online";
        }
      },

      4: {
        title: "Mission 4: Conditions",
        starter: 'var energy = 100;\nvar systemStatus = "";\n\nif () {\n  systemStatus = "";\n}',
        success: "CONDITION SYSTEM RESTORED.",
        bytebot: 'Use an <span class="highlight">if statement</span> to check if energy is greater than or equal to 100. Then set systemStatus to <span class="highlight">"Ready"</span>.',
        hint1: 'Your condition should be: energy >= 100',
        hint2: 'Inside the if block, use: systemStatus = "Ready";',
        previewHTML: '<h2>Condition Terminal</h2><p id="output">Checking energy level...</p>',
        check: function (win) {
          return win.energy === 100 && win.systemStatus === "Ready";
        }
      },

      5: {
        title: "Mission 5: Loops",
        starter: 'var cells = [];\n\nfor () {\n  cells.push("cell");\n}',
        success: "LOOP ENGINE ACTIVATED.",
        bytebot: 'Use a <span class="highlight">for loop</span> to add 5 items into the cells array.',
        hint1: 'A for loop usually starts with: for (var i = 0; i < 5; i++)',
        hint2: 'Each loop should run cells.push("cell");',
        previewHTML: '<h2>Loop Terminal</h2><p id="output">Generating power cells...</p>',
        check: function (win) {
          return Array.isArray(win.cells) && win.cells.length === 5;
        }
      },

      6: {
        title: "Mission 6: DOM Manipulation",
        starter: 'document.getElementById("target").innerText = "";',
        success: "DOM CONTROL RESTORED.",
        bytebot: 'Change the target text to <span class="highlight">"System Online"</span> using JavaScript.',
        hint1: 'Use document.getElementById("target").innerText',
        hint2: 'Set the text to "System Online".',
        previewHTML: '<h2>DOM Terminal</h2><p id="target">System Offline</p>',
        check: function (win) {
          const target = win.document.getElementById("target");

          return target && target.innerText === "System Online";
        }
      },

      7: {
        title: "BOSS MODE: Counter App",
        starter: 'var count = 0;\n\nfunction increaseCounter() {\n  count++;\n  document.getElementById("counter").innerText = count;\n}\n\ndocument.getElementById("increase-btn").addEventListener("click", increaseCounter);',
        boss: true,
        success: "BOSS CLEARED: JAVASCRIPT CORE COMPLETE.",
        bytebot: 'Final JavaScript test. Make the button increase the counter from <span class="highlight">0</span> to <span class="highlight">1</span> when clicked.',
        hint1: 'Use a count variable and increase it when the button is clicked.',
        hint2: 'The counter text must update after clicking the button.',
        previewHTML: '<h2>Counter App</h2><h1 id="counter">0</h1><button id="increase-btn">Increase</button>',
        check: function (win) {
          const button = win.document.getElementById("increase-btn");
          const counter = win.document.getElementById("counter");

          if (!button || !counter) return false;

          button.click();

          return counter.innerText === "1";
        }
      }
    };

    function loadMission() {
      const mission = missions[level];
      const title = document.getElementById("mission-title");
      const result = document.getElementById("result");
      const hint = document.getElementById("hint");
      const warning = document.getElementById("warning");
      const bytebot = document.getElementById("bytebot-message");
      const codeBox = document.getElementById("code");

      attempts = 0;
      lastWarningMessage = "";
      result.innerText = "";
      hint.innerText = "";
      warning.innerText = "";

      if (!mission) {
        title.innerText = "JAVASCRIPT ARENA COMPLETE!";
        bytebot.innerText = "JavaScript Core is complete. Head back to Mission Control.";
        codeBox.value = "";
        updatePreview();
        return;
      }

      title.innerText = mission.title;
      bytebot.innerHTML = mission.bytebot;
      codeBox.value = mission.starter;

      updatePreview();
    }

    function setWarning(message) {
      const warning = document.getElementById("warning");

      warning.innerText = message;

      if (message && message !== lastWarningMessage) {
        playMistake();
      }

      lastWarningMessage = message;
    }

    function checkSyntaxWarnings(rawCode) {
      if (rawCode.trim().length === 0) {
        setWarning("");
        return;
      }

      const openParen = (rawCode.match(/\(/g) || []).length;
      const closeParen = (rawCode.match(/\)/g) || []).length;
      const openBrace = (rawCode.match(/{/g) || []).length;
      const closeBrace = (rawCode.match(/}/g) || []).length;
      const quoteDouble = (rawCode.match(/"/g) || []).length;
      const quoteSingle = (rawCode.match(/'/g) || []).length;

      if (openParen !== closeParen) {
        setWarning("⚠️ Parentheses are not balanced. Check your ( and ).");
        return;
      }

      if (openBrace !== closeBrace) {
        setWarning("⚠️ Curly braces are not balanced. Check your { and }.");
        return;
      }

      if (quoteDouble % 2 !== 0 || quoteSingle % 2 !== 0) {
        setWarning("⚠️ One of your quotes is not closed.");
        return;
      }

      setWarning("");
    }

    function buildPreviewDocument(playerCode) {
      const mission = missions[level];
      const previewHTML = mission ? mission.previewHTML : "<h2>JavaScript Arena Complete</h2>";
      const safeCode = playerCode.replace(/<\/script>/gi, "<\\/script>");

      return (
        '<!DOCTYPE html>' +
        '<html>' +
        '<head>' +
        '<style>' +
        'body {' +
        'background: #050B12;' +
        'color: #39FF5A;' +
        'font-family: monospace;' +
        'text-align: center;' +
        'padding: 20px;' +
        'margin: 0;' +
        '}' +
        'h1, h2, p { color: #39FF5A; }' +
        'button {' +
        'background: transparent;' +
        'color: #39FF5A;' +
        'border: 2px solid #39FF5A;' +
        'padding: 8px 14px;' +
        'cursor: pointer;' +
        'font-family: monospace;' +
        '}' +
        'button:hover {' +
        'background: #39FF5A;' +
        'color: #03080F;' +
        '}' +
        '</style>' +
        '</head>' +
        '<body>' +
        previewHTML +
        '<scr' + 'ipt>' +
        'window.__logs = [];' +
        'window.__error = "";' +
        'console.log = function () {' +
        'var message = Array.prototype.slice.call(arguments).join(" ");' +
        'window.__logs.push(message);' +
        '};' +
        'try {' +
        safeCode +
        '} catch (error) {' +
        'window.__error = error.message;' +
        '}' +
        '</scr' + 'ipt>' +
        '</body>' +
        '</html>'
      );
    }

    function updatePreview() {
      const code = document.getElementById("code").value;
      const preview = document.getElementById("preview");

      checkSyntaxWarnings(code);

      preview.srcdoc = buildPreviewDocument(code);

      setTimeout(updateConsoleOutput, 100);
    }

    function updateConsoleOutput() {
      const preview = document.getElementById("preview");
      const consoleOutput = document.getElementById("console-output");

      try {
        const win = preview.contentWindow;
        const logs = win.__logs || [];
        const error = win.__error || "";

        if (error) {
          consoleOutput.innerText = "ERROR: " + error;
          consoleOutput.style.color = "#FF3B3B";
          return;
        }

        if (logs.length > 0) {
          consoleOutput.innerText = logs.join("\n");
        } else {
          consoleOutput.innerText = "Console ready...";
        }

        consoleOutput.style.color = "#39FF5A";
      } catch (error) {
        consoleOutput.innerText = "Console unavailable.";
        consoleOutput.style.color = "#FF3B3B";
      }
    }

    function checkCode() {
      const preview = document.getElementById("preview");
      const result = document.getElementById("result");
      const mission = missions[level];

      updatePreview();

      if (!mission) {
        result.innerText = "🏆 JavaScript Arena already complete.";
        return;
      }

      setTimeout(function () {
        const win = preview.contentWindow;

        updateConsoleOutput();

        if (win.__error) {
          playError();
          attempts++;
          showHint(mission);
          result.innerText = "❌ Code error detected.";
          return;
        }

        if (mission.check(win)) {
          const reward = mission.boss ? 50 : 10;
          success(reward, level + 1, mission.success);
        } else {
          playError();
          attempts++;
          showHint(mission);
          result.innerText = "❌ System not restored yet.";
        }
      }, 150);
    }

    function showHint(mission) {
      const hint = document.getElementById("hint");

      if (attempts === 1) {
        hint.innerText = "Hint 1: " + mission.hint1;
      } else if (attempts >= 2) {
        hint.innerText = "Hint 2: " + mission.hint2;
      }
    }

    function success(xpGain, nextLevel, message) {
      const result = document.getElementById("result");
      const hint = document.getElementById("hint");

      const isBossComplete = nextLevel > 7;
      const redirectDelay = isBossComplete ? 4200 : 1200;

      result.innerText = "✅ " + message + " +" + xpGain + " XP";
      hint.innerText = "";
      setWarning("");

      playSuccess();

      if (isBossComplete) {
        setTimeout(function () {
          playUnlock();
        }, 300);
      }

      document.body.classList.add("success-flash");

      setTimeout(function () {
        document.body.classList.remove("success-flash");
      }, 400);

      showXPPop(xpGain);

      addXP(xpGain);
      level = nextLevel;
      localStorage.setItem("js-level", level);

      setTimeout(function () {
        window.location.href = "js-map.html";
      }, redirectDelay);
    }

    function addXP(points) {
      let xp = parseInt(localStorage.getItem("xp")) || 0;
      xp += points;
      localStorage.setItem("xp", xp);
    }

    function showXPPop(amount) {
      const xp = document.createElement("div");
      xp.className = "xp-pop";
      xp.innerText = "+" + amount + " XP";

      document.body.appendChild(xp);

      setTimeout(function () {
        xp.remove();
      }, 1000);
    }

    function playSound(id) {
      const sound = document.getElementById(id);

      if (!sound) return;

      sound.currentTime = 0;

      sound.play().catch(function () {
        console.log("Sound blocked or missing:", id);
      });
    }

    function playSuccess() {
      playSound("success-sound");
    }

    function playError() {
      playSound("error-sound");
    }

    function playUnlock() {
      playSound("unlock-sound");
    }

    function playMistake() {
      playSound("mistake-sound");
    }

    document.getElementById("code").addEventListener("input", updatePreview);

    loadMission();
  </script>

</body>
</html>
