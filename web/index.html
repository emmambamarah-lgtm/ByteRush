<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ByteRush — Retro Coding Quest</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="theme-home">

  <!-- START SCREEN -->
  <div id="start-screen">
    <div class="glow-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="panel-wrapper">
      <div class="panel">
        <div class="content">

          <div class="status-bar">
            <span class="status-bar__left">
              <span class="status-dot"></span>SYS ONLINE
            </span>
            <span class="status-bar__right">V1.0.0</span>
          </div>

          <div class="label-top">START YOUR</div>
          <h1 class="title">BYTERUSH</h1>
          <div class="subtitle">RETRO CODING QUEST</div>

          <p class="description">
            Build. Style. Script.<br />
            Complete coding missions and power up your skills.<span class="cursor-blink"></span>
          </p>

          <div class="divider"></div>
          <button id="start-btn" class="btn-start" type="button">PRESS START</button>
          <div class="divider"></div>

          <div class="modes">
            <div class="mode-tag"><span class="tag-icon"></span>HTML ARENA</div>
            <div class="mode-tag"><span class="tag-icon"></span>CSS CIRCUIT</div>
            <div class="mode-tag"><span class="tag-icon"></span>JAVASCRIPT CORE</div>
          </div>

        </div>
      </div>
    </div>

    <div class="credits">
      <p>©️ 2026 BYTERUSH — ALL SYSTEMS NOMINAL</p>
    </div>
  </div>

  <script src="script.js"></script>
  <link rel="stylesheet" href="arcade-theme.css">

</body>
</html>
