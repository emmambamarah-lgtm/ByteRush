<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Counter | ByteRush</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="projects.css" />
</head>
<body>
  <script src="projects.js"></script>

  <script>
    ByteRushProjects.createProjectPage({
      projectId: "project-3",
      title: "Energy Counter",
      difficulty: "Beginner JS",
      xp: 75,
      completeTitle: "Energy Counter Online",
      completeMessage: "You made the interface respond to clicks.",
      startHTML: "",
      startCSS: "",
      startJS: "",
      steps: [
        {
          title: "Create the Counter Panel",
          objective: "Create the main box for the counter.",
          why: "The counter panel will hold the number and buttons.",
          code: `<div class="counter-panel">

</div>`,
          preview: "An empty counter panel should appear.",
          hint: "Type this in the HTML box.",
          check: function (api) {
            return /class=["']counter-panel["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Counter panel detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a div with class=\"counter-panel\"." };
          }
        },
        {
          title: "Add the Number Display",
          objective: "Add the number that will change.",
          why: "The display shows the current energy count.",
          code: `<h2 id="countDisplay">0</h2>`,
          preview: "The number 0 should appear in the preview.",
          hint: "The id must be exactly countDisplay.",
          check: function (api) {
            return /id=["']countDisplay["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Count display detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add an element with id=\"countDisplay\"." };
          }
        },
        {
          title: "Add the Increase Button",
          objective: "Add a button that will increase the number.",
          why: "Buttons let the player interact with the page.",
          code: `<button id="increaseBtn">Increase</button>`,
          preview: "An Increase button should appear.",
          hint: "The id must be exactly increaseBtn.",
          check: function (api) {
            return /<button[^>]+id=["']increaseBtn["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Increase button detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a button with id=\"increaseBtn\"." };
          }
        },
        {
          title: "Add the Decrease Button",
          objective: "Add a button that will decrease the number.",
          why: "This button will subtract 1 from the count.",
          code: `<button id="decreaseBtn">Decrease</button>`,
          preview: "A Decrease button should appear.",
          hint: "The id must be exactly decreaseBtn.",
          check: function (api) {
            return /<button[^>]+id=["']decreaseBtn["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Decrease button detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a button with id=\"decreaseBtn\"." };
          }
        },
        {
          title: "Add the Reset Button",
          objective: "Add a button that resets the number.",
          why: "The reset button brings the count back to 0.",
          code: `<button id="resetBtn">Reset</button>`,
          preview: "A Reset button should appear.",
          hint: "The id must be exactly resetBtn.",
          check: function (api) {
            return /<button[^>]+id=["']resetBtn["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Reset button detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a button with id=\"resetBtn\"." };
          }
        },
        {
          title: "Style the Counter Panel",
          objective: "Make the counter look like a control panel.",
          why: "CSS helps the counter feel like part of the ByteRush system.",
          code: `.counter-panel {
  background: #07111D;
  border: 2px solid #39FF5A;
  padding: 20px;
  border-radius: 16px;
  text-align: center;
}`,
          preview: "The counter should now look like a styled panel.",
          hint: "Type this in the CSS box.",
          check: function (api) {
            const css = api.normalize(api.css);
            const pass = css.includes(".counter-panel") &&
              css.includes("background") &&
              css.includes("border") &&
              css.includes("padding") &&
              css.includes("border-radius") &&
              css.includes("text-align");

            return pass
              ? { pass: true, message: "STEP ONLINE: Counter panel styling detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Style .counter-panel with background, border, padding, border-radius, and text-align." };
          }
        },
        {
          title: "Create the Count Variable",
          objective: "Create the number JavaScript will remember.",
          why: "A variable is a small storage box. Here, it stores the current count.",
          code: `let count = 0;`,
          preview: "Nothing visible changes yet. This prepares the counter.",
          hint: "Type this in the JavaScript box.",
          check: function (api) {
            return /let\s+count\s*=\s*0/i.test(api.js)
              ? { pass: true, message: "STEP ONLINE: Count variable detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add let count = 0; in the JavaScript box." };
          }
        },
        {
          title: "Find the Display and Buttons",
          objective: "Tell JavaScript where the display and buttons are.",
          why: "JavaScript needs to find the HTML elements before it can control them.",
          code: `const countDisplay = document.getElementById("countDisplay");
const increaseBtn = document.getElementById("increaseBtn");
const decreaseBtn = document.getElementById("decreaseBtn");
const resetBtn = document.getElementById("resetBtn");`,
          preview: "Nothing visible changes yet. JavaScript is now connected to the page elements.",
          hint: "Use document.getElementById for all four elements.",
          check: function (api) {
            const js = api.js;
            const pass = js.includes('getElementById("countDisplay")') &&
              js.includes('getElementById("increaseBtn")') &&
              js.includes('getElementById("decreaseBtn")') &&
              js.includes('getElementById("resetBtn")');

            return pass
              ? { pass: true, message: "STEP ONLINE: JavaScript found all counter parts." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Use getElementById for countDisplay, increaseBtn, decreaseBtn, and resetBtn." };
          }
        },
        {
          title: "Make the Increase Button Work",
          objective: "Make the number go up when the button is clicked.",
          why: "A click event tells JavaScript what to do when someone clicks a button.",
          code: `increaseBtn.addEventListener("click", function () {
  count = count + 1;
  countDisplay.textContent = count;
});`,
          preview: "When the Increase button is clicked, the number should go up by 1.",
          hint: "Click the preview button after typing the JavaScript.",
          check: function (api) {
            const btn = api.preview.querySelector("#increaseBtn");
            const display = api.preview.querySelector("#countDisplay");
            if (!btn || !display) {
              return { pass: false, message: "SYSTEM CHECK FAILED: Build the display and Increase button first." };
            }

            const before = display.textContent;
            btn.click();

            return display.textContent !== before
              ? { pass: true, message: "STEP ONLINE: Increase button changes the number." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Clicking Increase should change the number." };
          }
        },
        {
          title: "Make the Decrease Button Work",
          objective: "Make the number go down when the button is clicked.",
          why: "This works like the increase button, but subtracts instead of adds.",
          code: `decreaseBtn.addEventListener("click", function () {
  count = count - 1;
  countDisplay.textContent = count;
});`,
          preview: "When the Decrease button is clicked, the number should go down by 1.",
          hint: "Use count = count - 1 inside the click function.",
          check: function (api) {
            const btn = api.preview.querySelector("#decreaseBtn");
            const display = api.preview.querySelector("#countDisplay");
            if (!btn || !display) {
              return { pass: false, message: "SYSTEM CHECK FAILED: Build the display and Decrease button first." };
            }

            const before = display.textContent;
            btn.click();

            return display.textContent !== before
              ? { pass: true, message: "STEP ONLINE: Decrease button changes the number." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Clicking Decrease should change the number." };
          }
        },
        {
          title: "Make the Reset Button Work",
          objective: "Make the number return to 0.",
          why: "Reset buttons are useful when the player wants to start over.",
          code: `resetBtn.addEventListener("click", function () {
  count = 0;
  countDisplay.textContent = count;
});`,
          preview: "When the Reset button is clicked, the number should return to 0.",
          hint: "Set count back to 0 and update the display.",
          check: function (api) {
            const inc = api.preview.querySelector("#increaseBtn");
            const reset = api.preview.querySelector("#resetBtn");
            const display = api.preview.querySelector("#countDisplay");

            if (!inc || !reset || !display) {
              return { pass: false, message: "SYSTEM CHECK FAILED: Build the buttons and display first." };
            }

            inc.click();
            reset.click();

            return display.textContent.trim() === "0"
              ? { pass: true, message: "STEP ONLINE: Reset button returns the number to 0." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Clicking Reset should change the number back to 0." };
          }
        },
        {
          title: "Complete the Build",
          objective: "Finish the working counter.",
          why: "You created a real interactive interface using HTML, CSS, and JavaScript.",
          code: "",
          preview: "The counter should show buttons that increase, decrease, and reset the number.",
          hint: "Check this final step, then press Complete Project.",
          check: function () {
            return { pass: true, message: "STEP ONLINE: Energy Counter ready for completion." };
          }
        }
      ]
    });
  </script>
</body>
</html>
