<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Identity Badge | ByteRush</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="projects.css" />
</head>
<body>
  <script src="projects.js"></script>

  <script>
    ByteRushProjects.createProjectPage({
      projectId: "project-1",
      title: "Identity Badge",
      difficulty: "Beginner",
      xp: 50,
      completeTitle: "Identity Badge Online",
      completeMessage: "You created your first player profile card.",
      startHTML: "",
      startCSS: "",
      startJS: "",
      steps: [
        {
          title: "Create the Badge Box",
          objective: "Create the main box that holds the badge.",
          why: "A div is a box. We use it to group things together on the page.",
          code: `<div class="badge-card">

</div>`,
          preview: "An empty badge card area should appear in the preview.",
          hint: "Type this in the HTML box. The class name must be badge-card.",
          check: function (api) {
            return /<div[^>]+class=["']badge-card["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Your badge-card box exists." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a div with class=\"badge-card\" in the HTML box." };
          }
        },
        {
          title: "Add Your Avatar",
          objective: "Add a simple avatar inside the badge.",
          why: "An avatar gives the player card personality. It can be an emoji, letter, or small text.",
          code: `<div class="avatar">⚡</div>`,
          preview: "A small avatar should appear inside the badge.",
          hint: "Place the avatar div inside your badge-card div.",
          check: function (api) {
            return /class=["']avatar["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Avatar detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add an element with class=\"avatar\" inside the badge." };
          }
        },
        {
          title: "Add Your Player Name",
          objective: "Place your player name inside the badge.",
          why: "A heading is used for important text. Your player name is the main text on the card.",
          code: `<h2>Code Explorer</h2>`,
          preview: "The player name should appear under the avatar.",
          hint: "Use an h2 tag for the player name.",
          check: function (api) {
            return /<h2[\s>]/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Player name heading detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add an h2 tag for your player name." };
          }
        },
        {
          title: "Add Your Bio",
          objective: "Add a short sentence about your coding journey.",
          why: "A paragraph is used for normal text. This gives the badge more personality.",
          code: `<p>I am learning to build the web one mission at a time.</p>`,
          preview: "A short bio should appear under the player name.",
          hint: "Use a p tag for the bio.",
          check: function (api) {
            return /<p[\s>]/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Bio paragraph detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a paragraph tag for your bio." };
          }
        },
        {
          title: "Add a Skill Tag",
          objective: "Add a small label that shows your skill.",
          why: "A span is useful for small pieces of text, like badges, labels, and tags.",
          code: `<span class="skill-tag">HTML Builder</span>`,
          preview: "A small skill tag should appear inside the badge.",
          hint: "Use class=\"skill-tag\" exactly.",
          check: function (api) {
            return /class=["']skill-tag["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Skill tag detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a span with class=\"skill-tag\"." };
          }
        },
        {
          title: "Style the Badge",
          objective: "Make the badge look like a real game card.",
          why: "CSS changes how the HTML looks. Background, border, padding, and rounded corners make the card feel designed.",
          code: `.badge-card {
  background: #07111D;
  border: 2px solid #39FF5A;
  padding: 20px;
  border-radius: 16px;
}`,
          preview: "The badge should now have a dark background, green border, space inside, and rounded corners.",
          hint: "Type this in the CSS box.",
          check: function (api) {
            const css = api.normalize(api.css);
            const pass = css.includes(".badge-card") &&
              css.includes("background") &&
              css.includes("border") &&
              css.includes("padding") &&
              css.includes("border-radius");

            return pass
              ? { pass: true, message: "STEP ONLINE: Badge styling detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Style .badge-card with background, border, padding, and border-radius." };
          }
        },
        {
          title: "Complete the Build",
          objective: "Finish your player identity badge.",
          why: "You built a real profile card using HTML and CSS.",
          code: "",
          preview: "The full card should appear with avatar, name, bio, skill tag, and styling.",
          hint: "Check this step, then press Complete Project.",
          check: function () {
            return { pass: true, message: "STEP ONLINE: Identity Badge ready for completion." };
          }
        }
      ]
    });
  </script>
</body>
</html>
