<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Tracker | ByteRush</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="projects.css" />
</head>
<body>
  <script src="projects.js"></script>

  <script>
    ByteRushProjects.createProjectPage({
      projectId: "project-4",
      title: "Mission Tracker",
      difficulty: "Intermediate",
      xp: 100,
      completeTitle: "Mission Tracker Online",
      completeMessage: "You built a working mission tracker.",
      startHTML: "",
      startCSS: "",
      startJS: "",
      steps: [
        {
          title: "Create the Tracker App",
          objective: "Create the main box for the mission tracker.",
          why: "The tracker app will hold the input, button, and mission list.",
          code: `<div class="tracker-app">

</div>`,
          preview: "An empty tracker box should appear.",
          hint: "Type this in the HTML box.",
          check: function (api) {
            return /class=["']tracker-app["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Tracker app box detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a div with class=\"tracker-app\"." };
          }
        },
        {
          title: "Add the Title",
          objective: "Give the tracker a title.",
          why: "The title tells the player what the tool does.",
          code: `<h2>Mission Tracker</h2>`,
          preview: "The title should appear at the top of the tracker.",
          hint: "Use an h2 tag inside the tracker app.",
          check: function (api) {
            return /<h2[\s>]/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Tracker title detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add an h2 title." };
          }
        },
        {
          title: "Add the Input Field",
          objective: "Add a place where the player can type a mission.",
          why: "An input field lets the player type text into the app.",
          code: `<input id="missionInput" type="text" placeholder="Type a mission...">`,
          preview: "A text input should appear.",
          hint: "The id must be exactly missionInput.",
          check: function (api) {
            return /<input[^>]+id=["']missionInput["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Mission input detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add an input with id=\"missionInput\"." };
          }
        },
        {
          title: "Add the Button",
          objective: "Add a button for adding missions.",
          why: "The button will send the typed mission into the list.",
          code: `<button id="addMissionBtn">Add Mission</button>`,
          preview: "An Add Mission button should appear.",
          hint: "The id must be exactly addMissionBtn.",
          check: function (api) {
            return /<button[^>]+id=["']addMissionBtn["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Add Mission button detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a button with id=\"addMissionBtn\"." };
          }
        },
        {
          title: "Add the Mission List",
          objective: "Create a place where missions will appear.",
          why: "A list holds multiple items. Each mission will become one item.",
          code: `<ul id="missionList"></ul>`,
          preview: "An empty mission list area should appear.",
          hint: "The id must be exactly missionList.",
          check: function (api) {
            return /<ul[^>]+id=["']missionList["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Mission list detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a ul with id=\"missionList\"." };
          }
        },
        {
          title: "Style the Tracker",
          objective: "Make the tracker look like a real ByteRush tool.",
          why: "CSS makes the tracker easier to read and more fun to use.",
          code: `.tracker-app {
  background: #07111D;
  border: 2px solid #39FF5A;
  padding: 20px;
  border-radius: 16px;
}

.completed {
  text-decoration: line-through;
  opacity: 0.6;
}`,
          preview: "The tracker should now look like a styled app panel.",
          hint: "Type this in the CSS box.",
          check: function (api) {
            const css = api.normalize(api.css);
            const pass = css.includes(".tracker-app") &&
              css.includes("background") &&
              css.includes("border") &&
              css.includes("padding") &&
              css.includes("border-radius");

            return pass
              ? { pass: true, message: "STEP ONLINE: Tracker styling detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Style .tracker-app with background, border, padding, and border-radius." };
          }
        },
        {
          title: "Find the Input, Button, and List",
          objective: "Tell JavaScript where the tracker parts are.",
          why: "JavaScript needs to find the input, button, and list before it can use them.",
          code: `const missionInput = document.getElementById("missionInput");
const addMissionBtn = document.getElementById("addMissionBtn");
const missionList = document.getElementById("missionList");`,
          preview: "Nothing visible changes yet. JavaScript is now connected.",
          hint: "Use document.getElementById for all three parts.",
          check: function (api) {
            const js = api.js;
            const pass = js.includes('getElementById("missionInput")') &&
              js.includes('getElementById("addMissionBtn")') &&
              js.includes('getElementById("missionList")');

            return pass
              ? { pass: true, message: "STEP ONLINE: JavaScript found the tracker parts." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Use getElementById for missionInput, addMissionBtn, and missionList." };
          }
        },
        {
          title: "Add a Mission to the List",
          objective: "Make the button add typed text to the list.",
          why: "When the player types a mission and clicks the button, JavaScript creates a new list item.",
          code: `addMissionBtn.addEventListener("click", function () {
  const missionText = missionInput.value;

  if (missionText.trim() === "") {
    return;
  }

  const li = document.createElement("li");
  li.textContent = missionText;
  missionList.appendChild(li);

  missionInput.value = "";
});`,
          preview: "Typing a mission and clicking the button should add it to the list.",
          hint: "Create an li, set its text, and append it to missionList.",
          check: function (api) {
            const input = api.preview.querySelector("#missionInput");
            const btn = api.preview.querySelector("#addMissionBtn");
            const list = api.preview.querySelector("#missionList");

            if (!input || !btn || !list) {
              return { pass: false, message: "SYSTEM CHECK FAILED: Build the input, button, and list first." };
            }

            input.value = "Test Mission";
            btn.click();

            return list.children.length > 0
              ? { pass: true, message: "STEP ONLINE: Add Mission button creates a list item." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Type a mission and click Add Mission. A new list item should appear." };
          }
        },
        {
          title: "Mark a Mission Complete",
          objective: "Let the player click a mission to mark it complete.",
          why: "A class can change how something looks. When the mission is clicked, it gets a completed style.",
          code: `li.addEventListener("click", function () {
  li.classList.toggle("completed");
});`,
          preview: "Clicking a mission should mark it as complete or incomplete.",
          hint: "Put this code after the li is created inside the addMissionBtn click function.",
          check: function (api) {
            const input = api.preview.querySelector("#missionInput");
            const btn = api.preview.querySelector("#addMissionBtn");
            const list = api.preview.querySelector("#missionList");

            if (!input || !btn || !list) {
              return { pass: false, message: "SYSTEM CHECK FAILED: Build the tracker parts first." };
            }

            input.value = "Clickable Mission";
            btn.click();

            const li = list.querySelector("li");
            if (!li) {
              return { pass: false, message: "SYSTEM CHECK FAILED: Add Mission should create a list item first." };
            }

            li.click();

            return li.classList.contains("completed")
              ? { pass: true, message: "STEP ONLINE: Clicking a mission toggles the completed class." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Clicking a mission should add or remove the completed class." };
          }
        },
        {
          title: "Save Missions",
          objective: "Save missions so they do not disappear after refresh.",
          why: "localStorage lets the browser remember small pieces of information.",
          code: `function saveMissions() {
  localStorage.setItem("missions", missionList.innerHTML);
}

function loadMissions() {
  missionList.innerHTML = localStorage.getItem("missions") || "";
}

loadMissions();`,
          preview: "When missions are added, they should be saved. When the page reloads, saved missions should appear again.",
          hint: "Use localStorage.setItem and localStorage.getItem.",
          check: function (api) {
            const js = api.js;
            const pass = js.includes("localStorage.setItem") && js.includes("localStorage.getItem");

            return pass
              ? { pass: true, message: "STEP ONLINE: localStorage save and load code detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add localStorage.setItem and localStorage.getItem to save missions." };
          }
        },
        {
          title: "Complete the Build",
          objective: "Finish the mission tracker.",
          why: "You created a useful tool with typing, clicking, lists, styling, and saving.",
          code: "",
          preview: "The tracker should let you add missions, click missions complete, and save progress.",
          hint: "Check this final step, then press Complete Project.",
          check: function () {
            return { pass: true, message: "STEP ONLINE: Mission Tracker ready for completion." };
          }
        }
      ]
    });
  </script>
</body>
</html>
