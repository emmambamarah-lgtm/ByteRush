<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Reactor | ByteRush</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="projects.css" />
</head>
<body>
  <script src="projects.js"></script>

  <script>
    ByteRushProjects.createProjectPage({
      projectId: "project-5",
      title: "Skin Reactor",
      difficulty: "Intermediate",
      xp: 100,
      completeTitle: "Skin Reactor Online",
      completeMessage: "You controlled the look of the system.",
      startHTML: "",
      startCSS: "",
      startJS: "",
      steps: [
        {
          title: "Create the Reactor Card",
          objective: "Create the main card for the skin reactor.",
          why: "The card is the area where the theme buttons and status will live.",
          code: `<div class="reactor-card">

</div>`,
          preview: "An empty reactor card should appear.",
          hint: "Type this in the HTML box.",
          check: function (api) {
            return /class=["']reactor-card["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Reactor card detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a div with class=\"reactor-card\"." };
          }
        },
        {
          title: "Add the Title",
          objective: "Give the reactor a title.",
          why: "The title tells the player what system they are controlling.",
          code: `<h2>Skin Reactor</h2>`,
          preview: "The title should appear inside the card.",
          hint: "Use an h2 tag inside the reactor card.",
          check: function (api) {
            return /<h2[\s>]/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Reactor title detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add an h2 title." };
          }
        },
        {
          title: "Add the Description",
          objective: "Explain what the reactor does.",
          why: "A short description makes the interface easier to understand.",
          code: `<p>Choose a system skin to change the interface.</p>`,
          preview: "A short description should appear under the title.",
          hint: "Use a p tag under the title.",
          check: function (api) {
            return /<p[\s>]/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Description paragraph detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add a paragraph description." };
          }
        },
        {
          title: "Add the Status Text",
          objective: "Add text that shows the current theme.",
          why: "Status text tells the player what is happening.",
          code: `<p id="themeStatus">Current Skin: Default</p>`,
          preview: "The current skin status should appear.",
          hint: "The id must be exactly themeStatus.",
          check: function (api) {
            return /id=["']themeStatus["']/i.test(api.html)
              ? { pass: true, message: "STEP ONLINE: Theme status text detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add an element with id=\"themeStatus\"." };
          }
        },
        {
          title: "Add Theme Buttons",
          objective: "Add buttons for changing the skin.",
          why: "Each button will switch the interface to a different theme.",
          code: `<button id="defaultBtn">Default</button>
<button id="greenBtn">Green</button>
<button id="yellowBtn">Yellow</button>`,
          preview: "Three theme buttons should appear.",
          hint: "Use the exact ids: defaultBtn, greenBtn, yellowBtn.",
          check: function (api) {
            const html = api.html;
            const pass = html.includes('id="defaultBtn"') &&
              html.includes('id="greenBtn"') &&
              html.includes('id="yellowBtn"');

            return pass
              ? { pass: true, message: "STEP ONLINE: All three theme buttons detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add buttons with ids defaultBtn, greenBtn, and yellowBtn." };
          }
        },
        {
          title: "Create the Default Theme",
          objective: "Create the normal system look.",
          why: "The default theme is the starting design.",
          code: `.default-theme {
  background: #07111D;
  color: #E6FFE9;
}`,
          preview: "The interface should use the default dark system look.",
          hint: "Type this in the CSS box.",
          check: function (api) {
            return api.normalize(api.css).includes(".default-theme")
              ? { pass: true, message: "STEP ONLINE: Default theme detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add the .default-theme CSS class." };
          }
        },
        {
          title: "Create the Green Theme",
          objective: "Create a green system skin.",
          why: "A theme class changes the look when JavaScript applies it.",
          code: `.green-theme {
  background: #06210C;
  color: #39FF5A;
}`,
          preview: "The interface should be able to switch to a green look.",
          hint: "Type this in the CSS box.",
          check: function (api) {
            return api.normalize(api.css).includes(".green-theme")
              ? { pass: true, message: "STEP ONLINE: Green theme detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add the .green-theme CSS class." };
          }
        },
        {
          title: "Create the Yellow Theme",
          objective: "Create a yellow reward skin.",
          why: "This gives the player another visual option.",
          code: `.yellow-theme {
  background: #211B05;
  color: #FACC15;
}`,
          preview: "The interface should be able to switch to a yellow look.",
          hint: "Type this in the CSS box.",
          check: function (api) {
            return api.normalize(api.css).includes(".yellow-theme")
              ? { pass: true, message: "STEP ONLINE: Yellow theme detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add the .yellow-theme CSS class." };
          }
        },
        {
          title: "Find the Buttons and Card",
          objective: "Tell JavaScript where the buttons and card are.",
          why: "JavaScript needs to find elements before changing them.",
          code: `const reactorCard = document.querySelector(".reactor-card");
const themeStatus = document.getElementById("themeStatus");
const defaultBtn = document.getElementById("defaultBtn");
const greenBtn = document.getElementById("greenBtn");
const yellowBtn = document.getElementById("yellowBtn");`,
          preview: "Nothing visible changes yet. JavaScript is now ready.",
          hint: "Use querySelector for the card and getElementById for the buttons/status.",
          check: function (api) {
            const js = api.js;
            const pass = js.includes('querySelector(".reactor-card")') &&
              js.includes('getElementById("themeStatus")') &&
              js.includes('getElementById("defaultBtn")') &&
              js.includes('getElementById("greenBtn")') &&
              js.includes('getElementById("yellowBtn")');

            return pass
              ? { pass: true, message: "STEP ONLINE: JavaScript found the reactor parts." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Find reactorCard, themeStatus, defaultBtn, greenBtn, and yellowBtn." };
          }
        },
        {
          title: "Switch the Theme",
          objective: "Make each button change the skin.",
          why: "JavaScript can remove old theme classes and add the new one.",
          code: `function setTheme(themeClass) {
  reactorCard.classList.remove("default-theme", "green-theme", "yellow-theme");
  reactorCard.classList.add(themeClass);
}

defaultBtn.addEventListener("click", function () {
  setTheme("default-theme");
});

greenBtn.addEventListener("click", function () {
  setTheme("green-theme");
});

yellowBtn.addEventListener("click", function () {
  setTheme("yellow-theme");
});`,
          preview: "Default, Green, and Yellow buttons should change the card design.",
          hint: "Use classList.remove and classList.add.",
          check: function (api) {
            const card = api.preview.querySelector(".reactor-card");
            const green = api.preview.querySelector("#greenBtn");
            const yellow = api.preview.querySelector("#yellowBtn");

            if (!card || !green || !yellow) {
              return { pass: false, message: "SYSTEM CHECK FAILED: Build the card and buttons first." };
            }

            green.click();
            const greenWorks = card.classList.contains("green-theme");

            yellow.click();
            const yellowWorks = card.classList.contains("yellow-theme");

            return greenWorks && yellowWorks
              ? { pass: true, message: "STEP ONLINE: Theme buttons change the reactor skin." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Clicking Green and Yellow should change the card theme class." };
          }
        },
        {
          title: "Update the Status Text",
          objective: "Make the status text update when the theme changes.",
          why: "The player should always know which skin is active.",
          code: `greenBtn.addEventListener("click", function () {
  setTheme("green-theme");
  themeStatus.textContent = "Current Skin: Green";
});`,
          preview: "When Green is clicked, the text should say Current Skin: Green.",
          hint: "Update themeStatus.textContent inside each button click.",
          check: function (api) {
            const status = api.preview.querySelector("#themeStatus");
            const green = api.preview.querySelector("#greenBtn");

            if (!status || !green) {
              return { pass: false, message: "SYSTEM CHECK FAILED: Build the status text and Green button first." };
            }

            green.click();

            return /Current Skin:\s*Green/i.test(status.textContent)
              ? { pass: true, message: "STEP ONLINE: Status text updates correctly." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Clicking Green should update the status text to Current Skin: Green." };
          }
        },
        {
          title: "Save the Selected Theme",
          objective: "Remember the selected skin after refresh.",
          why: "localStorage lets the browser remember the theme the player chose.",
          code: `localStorage.setItem("selectedSkin", "green-theme");
const savedSkin = localStorage.getItem("selectedSkin");`,
          preview: "The selected theme should stay active after the page reloads.",
          hint: "Use localStorage.setItem and localStorage.getItem.",
          check: function (api) {
            const pass = api.js.includes("localStorage.setItem") && api.js.includes("localStorage.getItem");

            return pass
              ? { pass: true, message: "STEP ONLINE: Theme saving code detected." }
              : { pass: false, message: "SYSTEM CHECK FAILED: Add localStorage.setItem and localStorage.getItem to save the selected theme." };
          }
        },
        {
          title: "Complete the Build",
          objective: "Finish the skin reactor.",
          why: "You created a system that changes the interface using CSS and JavaScript.",
          code: "",
          preview: "The reactor should show buttons that switch skins, update status text, and save the selected skin.",
          hint: "Check this final step, then press Complete Project.",
          check: function () {
            return { pass: true, message: "STEP ONLINE: Skin Reactor ready for completion." };
          }
        }
      ]
    });
  </script>
</body>
</html>
